services:
  bubbaflix:
    image: ghcr.io/jsanderstechnologies/bubbaflix-media-center:latest
    container_name: bubbaflix
    restart: unless-stopped
    ports:
      - "5150:5150"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=5150
    networks:
      - bubbaflix-net

networks:
  bubbaflix-net:
    driver: bridge

