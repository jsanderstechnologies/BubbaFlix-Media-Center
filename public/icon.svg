<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" style="background: transparent;">
  <defs>
    <!-- Rich 3D cinematic red gradient for the B logo -->
    <linearGradient id="b-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4d4d" />
      <stop offset="35%" stop-color="#e50914" />
      <stop offset="75%" stop-color="#b30000" />
      <stop offset="100%" stop-color="#7a0000" />
    </linearGradient>

    <!-- Metallic border ring gradient -->
    <linearGradient id="ring-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#444" />
      <stop offset="50%" stop-color="#111" />
      <stop offset="100%" stop-color="#222" />
    </linearGradient>

    <!-- Deep solid backing gradient for the 3D offset shadow layer -->
    <linearGradient id="b-shadow-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b0000" />
      <stop offset="100%" stop-color="#140000" />
    </linearGradient>

    <!-- Expanded glowing filter for the ambient red backglow -->
    <filter id="icon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComponentTransfer in="blur" result="boost">
        <feFuncA type="linear" slope="2.0"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="boost" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Container Box with Rounded corners matching standard ZimaOS app tiles -->
  <rect x="16" y="16" width="480" height="480" rx="100" fill="#08080a" stroke="url(#ring-gradient)" stroke-width="8" />

  <!-- Ambient Red Backglow Behind the B Letter -->
  <g filter="url(#icon-glow)" opacity="0.8">
    <text 
      x="256" 
      y="384" 
      font-family="'Bebas Neue', 'Impact', 'Arial Black', sans-serif" 
      font-size="340" 
      font-weight="900" 
      fill="#ff1a1a" 
      text-anchor="middle"
    >B</text>
  </g>

  <!-- 3D Shadow Layer for the B Letter -->
  <text 
    x="262" 
    y="390" 
    font-family="'Bebas Neue', 'Impact', 'Arial Black', sans-serif" 
    font-size="340" 
    font-weight="900" 
    fill="url(#b-shadow-gradient)" 
    stroke="#000000"
    stroke-width="12"
    stroke-linejoin="round"
    text-anchor="middle"
  >B</text>

  <!-- Foreground Main Letter B with white reflection outline -->
  <text 
    x="256" 
    y="384" 
    font-family="'Bebas Neue', 'Impact', 'Arial Black', sans-serif" 
    font-size="340" 
    font-weight="900" 
    fill="url(#b-gradient)" 
    stroke="#ffffff"
    stroke-width="2"
    stroke-opacity="0.4"
    text-anchor="middle"
  >B</text>
</svg>
