<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 125" width="100%" height="100%" style="background: transparent;">
  <defs>
    <!-- Curve path with slightly more headroom -->
    <path id="bubbaflix-curve" d="M 15,98 Q 180,42 345,98" fill="none" />
    
    <!-- Rich 3D cinematic red gradient -->
    <linearGradient id="bubbaflix-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4d4d" />
      <stop offset="35%" stop-color="#e50914" />
      <stop offset="75%" stop-color="#b30000" />
      <stop offset="100%" stop-color="#7a0000" />
    </linearGradient>

    <!-- Combined professional text-shadow & vibrant backglow filter with expanded margins -->
    <filter id="bubbaflix-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3.5" stdDeviation="2.2" flood-color="#000000" flood-opacity="0.95"/>
      <feDropShadow dx="0" dy="0" stdDeviation="6.0" flood-color="#e50914" flood-opacity="0.5"/>
    </filter>
  </defs>

  <text 
    font-family="'Bebas Neue', 'Impact', 'Arial Black', sans-serif" 
    font-size="52" 
    font-weight="900" 
    fill="url(#bubbaflix-gradient)" 
    stroke="url(#bubbaflix-gradient)"
    stroke-width="0.8"
    stroke-linejoin="round"
    letter-spacing="0.5px"
    filter="url(#bubbaflix-glow)"
  >
    <textPath href="#bubbaflix-curve" startOffset="50%" text-anchor="middle">
      BUBBAFLIX
    </textPath>
  </text>
</svg>
