<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" width="100%" height="100%" style="background: transparent;">
  <defs>
    <!-- Shifted down further and flattened the curve to prevent clipping of the arched middle -->
    <path id="bubbaflix-curve" d="M 15,95 Q 180,45 345,95" fill="none" />
    
    <!-- Rich 3D cinematic red gradient -->
    <linearGradient id="bubbaflix-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4d4d" />
      <stop offset="35%" stop-color="#e50914" />
      <stop offset="75%" stop-color="#b30000" />
      <stop offset="100%" stop-color="#7a0000" />
    </linearGradient>

    <!-- Combined professional text-shadow & vibrant backglow filter with expanded margins -->
    <filter id="bubbaflix-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="3.0" flood-color="#000000" flood-opacity="0.95"/>
      <feDropShadow dx="0" dy="0" stdDeviation="5.0" flood-color="#e50914" flood-opacity="0.45"/>
    </filter>
  </defs>

  <text 
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" 
    font-size="52" 
    font-weight="900" 
    fill="url(#bubbaflix-gradient)" 
    letter-spacing="1px"
    filter="url(#bubbaflix-glow)"
  >
    <textPath href="#bubbaflix-curve" startOffset="50%" text-anchor="middle">
      BUBBAFLIX
    </textPath>
  </text>
</svg>
